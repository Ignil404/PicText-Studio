stages:
  - lint
  - type-check
  - test
  - frontend-build

# ─── Lint stage ─────────────────────────────────────────────────────
lint:backend:ruff:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install --quiet ruff
    - cd backend && ruff check . && ruff format --check .

# ─── Type-check stage ───────────────────────────────────────────────
type-check:
  stage: type-check
  image: python:3.12-slim
  script:
    - pip install --quiet --upgrade pip
    - cd backend && pip install -e ".[dev]" && mypy --strict .

# ─── Test stage ─────────────────────────────────────────────────────
test:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: dl2026_test
    DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dl2026_test
    REDIS_URL: redis://redis:6379/0
  script:
    - pip install --quiet --upgrade pip
    - cd backend && pip install -e ".[dev]" && python -m pytest tests/ -v

# ─── Frontend-build stage ───────────────────────────────────────────
frontend-build:
  stage: frontend-build
  image: node:20-alpine
  script:
    - cd frontend && npm install && npm run build
